<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أسعار الدولار والذهب</title>

<style>
body {
 margin: 0;
 font-family: Tahoma;
 background: #f3f4f6;
 direction: rtl;
}

.container {
 max-width: 600px;
 margin: auto;
 padding: 15px;
}

h1 {
 text-align: center;
}

/* Card */
.card {
 background: white;
 border-radius: 15px;
 padding: 15px;
 margin-bottom: 10px;
 display: flex;
 justify-content: space-between;
 align-items: center;
 box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

.price-red {
 background: #ff5a5a;
 color: white;
 padding: 8px 14px;
 border-radius: 10px;
}

.price-gold {
 background: #fbbf24;
 padding: 8px 14px;
 border-radius: 10px;
}

/* Buttons */
button, .toggle {
 width: 100%;
 padding: 12px;
 border: none;
 border-radius: 10px;
 margin: 10px 0;
 text-align: center;
 cursor: pointer;
}

button {
 background: #2563eb;
 color: white;
}

.toggle {
 background: white;
 box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}
</style>
</head>

<body>

<div class="container">

<h1> أسعار الدولار والذهب</h1>

<!-- الدولار -->
<div id="usd"></div>

<button onclick="update()"> تحديث الأسعار</button>

<!-- زر الذهب -->
<div class="toggle" onclick="showGold()"> عرض أسعار الذهب ▼</div>

<!-- الذهب -->
<div id="gold" style="display:none;"></div>

</div>

<script>

// الدولارlet usd = [
 ["بغداد",155354],
 ["البصرة",155820],
 ["أربيل",155412],
 ["كركوك",156283], ["السليمانية",155266], ["دهوك",156198],
];

// الذهبlet gold = [
 ["عيار 24","1,135,000"],
 ["عيار 22","1,040,000"],
 ["عيار 21","994,000"],
 ["عيار 18","853,000"],
];

// عرض الدولارfunction renderUSD() {
 let html = "";
 usd.forEach(x => {
 html += `
 <div class="card">
 <div class="price-red">${x[1].toLocaleString()} د.ع</div>
 <div>100$</div>
 <div>${x[0]}</div>
 </div>`;
 });
 document.getElementById("usd").innerHTML = html;
}

// عرض الذهبfunction renderGold() {
 let html = "";
 gold.forEach(x => {
 html += `
 <div class="card">
 <div class="price-gold">${x[1]} د.ع</div>
 <div>1 مثقال</div>
 <div>${x[0]}</div>
 </div>`;
 });
 document.getElementById("gold").innerHTML = html;
}

// زر الذهبfunction showGold() {
 let g = document.getElementById("gold");

 if (g.style.display === "none") {
 renderGold(); // هذا المهم 
 g.style.display = "block";
 } else {
 g.style.display = "none";
 }
}

// تحديثfunction update() {
 usd.forEach(x => {
 x[1] += Math.floor(Math.random()*300-150);
 });
 renderUSD();
}

// تشغيل أوليrenderUSD();

</script>

</body>
</html>
