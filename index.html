<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>سعر الدولار في العراق اليوم</title>
<style>
body {
 margin: 0;
 font-family: Arial, sans-serif;
 background: #f3f4f6;
 direction: rtl;
}

.container {
 max-width: 600px;
 margin: auto;
 padding: 20px;
}

h1 {
 text-align: center;
}

.card {
 background: #fff;
 border-radius: 15px;
 padding: 15px;
 margin-bottom: 15px;
 display: flex;
 align-items: center;
 justify-content: space-between;
 box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

.price-box {
 background: #ff5a5a;
 color: white;
 padding: 10px 15px;
 border-radius: 12px;
 font-weight: bold;
}

.city {
 display: flex;
 align-items: center;
 gap: 10px;
}

.flag {
 width: 25px;
}

.arrow {
 color: #6b7280;
 font-size: 18px;
}

.update {
 text-align: center;
 margin: 15px 0;
 color: #555;
}

button {
 width: 100%;
 padding: 10px;
 border: none;
 background: #2563eb;
 color: white;
 border-radius: 10px;
 cursor: pointer;
 font-size: 16px;
}

button:hover {
 background: #1e40af;
}
</style>

</head>

<body>

<div class="container">
 <h1> سعر الدولار في العراق</h1>

 <div class="update" id="time">آخر تحديث الآن</div>

 <div id="list"></div>

 <button onclick="updatePrices()"> تحديث الأسعار</button>
</div>

<script>

let data = [
 {city: "بغداد", price: 155450, flag: "https://flagcdn.com/w40/iq.png"},
 {city: "البصرة", price: 155500, flag: "https://flagcdn.com/w40/iq.png"},
 {city: "أربيل", price: 155600, flag: "https://flagcdn.com/w40/iq.png"},
 {city: "كركوك", price: 155700, flag: "https://flagcdn.com/w40/iq.png"},
 {city: "السليمانية", price: 155650, flag: "https://flagcdn.com/w40/iq.png"},
 {city: "دهوك", price: 155600, flag: "https://flagcdn.com/w40/iq.png"},
];

function render() {
 let html = "";
 data.forEach(item => {
 html += `
 <div class="card">
 <div class="arrow">▼</div>

 <div class="price-box">
 ${item.price.toLocaleString()} د.ع
 </div>

 <div>100$</div>

 <div class="city">
 <span>${item.city}</span>
 <img class="flag" src="${item.flag}">
 </div>
 </div>
 `;
 });

 document.getElementById("list").innerHTML = html;
}

function updatePrices() {
 data.forEach(item => {
 item.price += Math.floor(Math.random() * 200 - 100);
 });

 render();

 let now = new Date();
 document.getElementById("time").innerText =
 "آخر تحديث: " + now.toLocaleTimeString();
}

render();

</script>

</body>
</html>>

</div>
</body>
</html>
