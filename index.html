<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أسعار الدولار والذهب</title>

<style>
body {
margin: 0;
font-family: "Tahoma";
background: #f3f4f6;
direction: rtl;
}

.container {
max-width: 600px;
margin: auto;
padding: 15px;
}

h1 {
text-align: center;
}

/* 🔽 العنوان */
.section-title {
background: #fff;
padding: 12px;
border-radius: 12px;
margin: 15px 0;
cursor: pointer;
display: flex;
justify-content: space-between;
box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

/* 💳 الكروت */
.card {
background: #fff;
border-radius: 18px;
padding: 15px;
margin-bottom: 12px;
display: flex;
justify-content: space-between;
align-items: center;
box-shadow: 0 6px 15px rgba(0,0,0,0.08);
}

.price-red {
background: #ff5a5a;
color: white;
padding: 10px 16px;
border-radius: 12px;
font-weight: bold;
}

.price-gold {
background: #fbbf24;
color: black;
padding: 10px 16px;
border-radius: 12px;
font-weight: bold;
}

.city {
display: flex;
align-items: center;
gap: 8px;
}

.flag {
width: 24px;
}

.arrow {
color: #6b7280;
}
</style>

</head>

<body>

<div class="container">

<h1>💰 أسعار الدولار والذهب</h1>

<!-- 🔽 زر -->
<div class="section-title" onclick="toggle()">
<span>عرض / إخفاء الأسعار</span>
<span id="arrow">▲</span>
</div>

<!-- المحتوى -->
<div id="content"></div>

</div>

<script>

let data = [

// 💵 الدولار
{type:"usd", name:"بغداد", price:"155,354 د.ع"},
{type:"usd", name:"البصرة", price:"155,820 د.ع"},
{type:"usd", name:"أربيل", price:"155,412 د.ع"},
{type:"usd", name:"كركوك", price:"156,283 د.ع"},
{type:"usd", name:"السليمانية", price:"155,266 د.ع"},
{type:"usd", name:"دهوك", price:"156,198 د.ع"},

// 🪙 الذهب
{type:"gold", name:"الذهب عيار 24", price:"1,135,000 د.ع"},
{type:"gold", name:"الذهب عيار 22", price:"1,040,000 د.ع"},
{type:"gold", name:"الذهب عيار 21", price:"994,000 د.ع"},
{type:"gold", name:"الذهب عيار 18", price:"853,000 د.ع"},
{type:"gold", name:"أونصة الذهب", price:"$4,519"},
{type:"gold", name:"كيلو الذهب", price:"$145,284"},
{type:"gold", name:"أونصة فضة", price:"$71"},
{type:"gold", name:"كيلو فضة", price:"$2,273"}

];

// 🎨 عرض البيانات
function render() {
let html = "";

data.forEach(item => {
let priceClass = item.type === "usd" ? "price-red" : "price-gold";

html += `
<div class="card">
<div class="arrow">▼</div>
<div class="${priceClass}">${item.price}</div>
<div>${item.type === "usd" ? "100$" : "1 مثقال"}</div>
<div class="city">
<span>${item.name}</span>
${item.type === "usd" ? '<img class="flag" src="https://flagcdn.com/w40/iq.png">' : ""}
</div>
</div>
`;
});

document.getElementById("content").innerHTML = html;
}

// 🔽 فتح / غلق فقط (بدون render)
function toggle() {
let el = document.getElementById("content");
let arrow = document.getElementById("arrow");

if (el.style.display === "none") {
el.style.display = "block";
arrow.innerText = "▲";
} else {
el.style.display = "none";
arrow.innerText = "▼";
}
}

// 🔥 تشغيل أولي
render();

</script>

</body>
</html>
