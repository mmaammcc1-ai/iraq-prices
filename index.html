<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أسعار العراق | تحديث لحظي</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
body { background:#000; color:#fff; font-family:sans-serif; margin:0; padding-bottom:80px; }
.header { background:#111; padding:20px; text-align:center; border-bottom:2px solid #ffd700; color:#ffd700; font-size:1.4em; }
.card { background:#1a1a1a; margin:15px; padding:20px; border-radius:15px; border-right:6px solid #4caf50; }
.price { font-size:2em; font-weight:bold; display:block; margin-top:5px; }
.navbar { position:fixed; bottom:0; width:100%; background:#2c3e50; display:flex; justify-content:space-around; padding:12px 0; border-top:1px solid #444; }
.nav-item { color:#fff; text-decoration:none; text-align:center; font-size:0.8em; flex:1; }
.nav-item i { display:block; font-size:1.5em; margin-bottom:4px; }
</style>
</head>
<body>
<div class="header">🇮🇶 أسعار العراق اللحظية</div>
<div class="card">
<div style="color:#888">سعر الـ $100 (بغداد)</div>
<span class="price">150,250 <small style="font-size:0.5em">دينار</small></span>
</div>
<div class="card" style="border-right-color:#ffd700">
<div style="color:#888">مثقال الذهب عيار 21</div>
<span class="price">485,000 <small style="font-size:0.5em">دينار</small></span>
</div>
<div class="navbar">
<a class="nav-item" href="#"><i class="fa-solid fa-house"></i>الرئيسية</a>
<a class="nav-item" href="#"><i class="fa-solid fa-coins"></i>الذهب</a>
<a class="nav-item" href="#"><i class="fa-solid fa-calculator"></i>حاسبة</a>
</div>
</body>
</html>
